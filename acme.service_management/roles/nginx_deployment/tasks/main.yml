---
- name: Install Nginx package
  ansible.builtin.package:
    name: '{{ package_name }}'
    state: '{{ package_state }}'
  tags:
    - packages
    - nginx
  register: package_install

- name: Start Nginx service
  ansible.builtin.service:
    name: '{{ service_name }}'
    state: '{{ service_state }}'
    daemon_reload: '{{ service_daemon_reload }}'
  tags:
    - services
    - nginx
  when: package_state == 'present'

- name: Enable Nginx to start on boot
  ansible.builtin.service:
    name: '{{ service_name }}'
    enabled: '{{ service_enabled }}'
    daemon_reload: '{{ service_daemon_reload }}'
  tags:
    - services
    - nginx
  when: package_state == 'present'
