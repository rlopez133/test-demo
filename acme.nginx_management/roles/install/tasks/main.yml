---
- name: Install Nginx web server package
  tags:
    - nginx
    - install
    - package
  block:
    - name: Update package cache (Debian/Ubuntu)
      ansible.builtin.apt:
        cache_valid_time: 3600
        update_cache: true
      when: ansible_os_family == "Debian"
      register: apt_cache_update
      tags:
        - package

    - name: Install Nginx package on Debian-based systems
      ansible.builtin.apt:
        name: "{{ nginx_package_name }}"
        state: present
      when: ansible_os_family == "Debian"
      register: nginx_install_debian
      tags:
        - package

    - name: Install Nginx package on RedHat-based systems
      ansible.builtin.dnf:
        name: "{{ nginx_package_name }}"
        state: present
      when: ansible_os_family == "RedHat"
      register: nginx_install_redhat
      tags:
        - package

    - name: Display Nginx installation result
      ansible.builtin.debug:
        msg: "Nginx package ({{ nginx_package_name }}) has been installed successfully"
      when: nginx_install_debian is changed or nginx_install_redhat is changed

  rescue:
    - name: Display installation error
      ansible.builtin.fail:
        msg: "Failed to install Nginx package {{ nginx_package_name }}. Please check system logs and package repository availability."
