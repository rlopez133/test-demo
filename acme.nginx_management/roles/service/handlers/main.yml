---
- name: Restart Nginx service
  ansible.builtin.systemd_service:
    name: "{{ nginx_service_name }}"
    state: restarted
    daemon_reload: false
  listen: "restart nginx"

- name: Reload Nginx service
  ansible.builtin.systemd_service:
    name: "{{ nginx_service_name }}"
    state: reloaded
    daemon_reload: false
  listen: "reload nginx"
