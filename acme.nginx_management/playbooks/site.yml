---
- name: Install and manage Nginx web server
  hosts: all
  gather_facts: true
  pre_tasks:
    - name: Display collection execution notice
      ansible.builtin.debug:
        msg: "Running ACME Nginx Management Collection (acme.nginx_management)"
  roles:
    - acme.nginx_management.install
    - acme.nginx_management.service
  post_tasks:
    - name: Verify Nginx is running
      ansible.builtin.uri:
        url: "http://localhost:{{ nginx_port }}"
        method: GET
        status_code: 200, 301, 302, 404
      ignore_errors: true
      register: nginx_check
      tags:
        - verify
    - name: Display Nginx status
      ansible.builtin.debug:
        msg: "Nginx is operational on port {{ nginx_port }}"
      when: nginx_check is succeeded
      tags:
        - verify
