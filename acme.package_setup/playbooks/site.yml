---
# Main playbook for ACME Package Setup collection
# Purpose: Orchestrate package installation and service management

- name: Execute package setup automation
  hosts: all
  gather_facts: true
  tasks:
    - name: Include install_package role
      ansible.builtin.include_role:
        name: acme.package_setup.install_package
      tags:
        - package
        - always

    - name: Include manage_service role
      ansible.builtin.include_role:
        name: acme.package_setup.manage_service
      tags:
        - service
        - always
