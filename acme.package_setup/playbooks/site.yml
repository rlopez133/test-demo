---
# Main playbook for package setup and service management
# Orchestrates the installation and startup of system packages

- name: Setup packages and manage services
  hosts: all
  become: true
  gather_facts: true
  tags:
    - always

  pre_tasks:
    - name: Display target host information
      ansible.builtin.debug:
        msg: "Installing and managing services on {{ inventory_hostname }} ({{ ansible_os_family }})"
      tags:
        - debug

  roles:
    - name: Install required packages
      role: acme.package_setup.package_install
      tags:
        - package
        - always

    - name: Manage and start services
      role: acme.package_setup.service_manage
      tags:
        - service
        - always

  post_tasks:
    - name: Verify service is running
      ansible.builtin.systemd:
        name: "{{ service_name }}"
      register: service_status
      tags:
        - service
        - verify

    - name: Display service status
      ansible.builtin.debug:
        msg: "Service {{ service_name }} status: {{ service_status.status.ActiveState }}"
      tags:
        - service
        - verify
        - debug