---
# Main playbook for ACME Package Setup collection
# Orchestrates package installation and service management

- name: Configure packages and services
  hosts: all
  gather_facts: true
  tags:
    - always

  pre_tasks:
    - name: Display target system information
      ansible.builtin.debug:
        msg: |
          Target: {{ inventory_hostname }}
          OS Family: {{ ansible_os_family }}
          Distribution: {{ ansible_distribution }} {{ ansible_distribution_version }}
      tags:
        - debug

  roles:
    - role: package_manager
      tags:
        - packages
      vars:
        package_name: '{{ package_name | default("nginx") }}'
        package_state: '{{ package_state | default("present") }}'

    - role: service_controller
      tags:
        - services
      vars:
        service_name: '{{ service_name | default("nginx") }}'
        service_state: '{{ service_state | default("started") }}'
        service_enabled: '{{ service_enabled | default(true) }}'

  post_tasks:
    - name: Verify final system state
      ansible.builtin.debug:
        msg: 'Package and service configuration complete on {{ inventory_hostname }}'
      tags:
        - debug
