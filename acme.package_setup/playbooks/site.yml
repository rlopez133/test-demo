---
- name: ACME Package Setup Playbook
  hosts: all
  gather_facts: true
  tasks:
    - name: Include nginx_setup role
      ansible.builtin.include_role:
        name: acme.package_setup.nginx_setup
        apply:
          tags:
            - nginx
            - packages
            - services
      tags:
        - nginx
        - packages
        - services
