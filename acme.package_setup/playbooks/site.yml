---
- name: Configure nginx package and service
  hosts: all
  gather_facts: true
  
  pre_tasks:
    - name: Display playbook execution information
      ansible.builtin.debug:
        msg: |
          Executing nginx package and service configuration
          Target hosts: {{ inventory_hostname }}
          OS family: {{ ansible_os_family }}
      tags:
        - always
  
  roles:
    - name: nginx_service
      tags:
        - nginx
        - package
        - service
  
  post_tasks:
    - name: Verify nginx installation and service status
      block:
        - name: Check if nginx package is installed
          ansible.builtin.shell: |
            set -e
            if command -v nginx &> /dev/null; then
              nginx -v 2>&1
            else
              echo "Nginx not found in PATH"
              exit 1
            fi
          changed_when: false
          register: nginx_version
          tags:
            - always
            - verify

        - name: Check nginx service status
          ansible.builtin.service:
            name: "{{ nginx_service_name | default('nginx') }}"
            state: started
          check_mode: true
          register: nginx_service_check
          tags:
            - always
            - verify
          ignore_errors: true

        - name: Display nginx version and service status
          ansible.builtin.debug:
            msg:
              - "Nginx version: {{ nginx_version.stdout }}"
              - "Service status check: {{ 'PASS' if not nginx_service_check.failed else 'NEEDS ATTENTION' }}"
          tags:
            - always
            - verify
      
      rescue:
        - name: Display post-task error information
          ansible.builtin.debug:
            msg: "Post-task verification encountered an issue (this may be normal in check mode)"
          tags:
            - always
            - verify
