---
- name: ACME Package Setup - Main Playbook
  hosts: all
  gather_facts: true
  pre_tasks:
    - name: Display automation intent
      ansible.builtin.debug:
        msg: |
          Executing ACME Package Setup Collection
          Step 1: Install package {{ package_name }}
          Step 2: Manage service {{ service_name }}
      tags:
        - always

  roles:
    - name: Install packages
      role: acme.package_setup.package_installer
      tags:
        - packages

    - name: Manage services
      role: acme.package_setup.service_manager
      tags:
        - services

  post_tasks:
    - name: Verify automation completion
      ansible.builtin.debug:
        msg: "ACME Package Setup Collection execution completed successfully"
      tags:
        - always
