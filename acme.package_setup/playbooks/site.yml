---
# Main playbook: Package and Service Setup
# Installs packages and manages their associated services

- name: Setup packages and services
  hosts: all
  gather_facts: true
  vars_files: []

  pre_tasks:
    - name: Display automation purpose
      ansible.builtin.debug:
        msg: |
          Starting package installation and service management workflow
          Package: {{ package_name | default('nginx') }}
          Service: {{ service_name | default('nginx') }}
      tags:
        - always

  roles:
    # Step 1: Install package with specified state
    - role: package_installer
      vars:
        package_name: nginx
        package_state: present
      tags:
        - package
        - install

    # Step 2: Manage service (start/enable)
    - role: service_manager
      vars:
        service_name: nginx
        service_action: started
        service_enabled: true
      tags:
        - service
        - manage

  post_tasks:
    - name: Confirm automation completion
      ansible.builtin.debug:
        msg: |
          Package and service setup completed successfully
          Service Status: {{ service_status.status['ActiveState'] | default('unknown') }}
      tags:
        - always
