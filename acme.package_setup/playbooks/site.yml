---
- name: ACME Package Setup - Install and manage nginx
  hosts: all
  gather_facts: yes
  become: yes
  tags:
    - always

  pre_tasks:
    - name: Validate required variables
      ansible.builtin.assert:
        that:
          - package_name is defined
          - package_state is defined
          - service_name is defined
          - service_state is defined
        fail_msg: "Required variables are not defined. Check defaults/main.yml"
      tags:
        - always

  roles:
    - role: acme.package_setup.nginx_install
      tags:
        - install
        - package
    
    - role: acme.package_setup.nginx_service
      tags:
        - service
        - manage

  post_tasks:
    - name: Display automation summary
      ansible.builtin.debug:
        msg: |
          Automation completed successfully!
          - Package: {{ package_name }} (state: {{ package_state }})
          - Service: {{ service_name }} (state: {{ service_state }}, enabled: {{ service_enabled }})
      tags:
        - always
