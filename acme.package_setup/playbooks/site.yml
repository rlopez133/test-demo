---
- name: Configure nginx package and service
  hosts: all
  gather_facts: true
  tasks:
    - name: Include nginx_package role
      ansible.builtin.include_role:
        name: acme.package_setup.nginx_package
      tags:
        - package
        - nginx

    - name: Include nginx_service role
      ansible.builtin.include_role:
        name: acme.package_setup.nginx_service
      tags:
        - service
        - nginx
