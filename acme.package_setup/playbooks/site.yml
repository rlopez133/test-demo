---
- name: ACME Package Setup - Main Playbook
  hosts: all
  gather_facts: true
  vars:
    # Example: Install nginx package
    package_name: "{{ install_package_name | default('nginx') }}"
    package_state: "{{ install_package_state | default('present') }}"
    # Example: Start nginx service
    service_name: "{{ manage_service_name | default('nginx') }}"
    service_state: "{{ manage_service_state | default('started') }}"
    service_enabled: "{{ manage_service_enabled | default(true) }}"

  pre_tasks:
    - name: Display automation intent
      ansible.builtin.debug:
        msg: |
          Starting ACME Package Setup automation:
          - Installing package: {{ package_name }} (state: {{ package_state }})
          - Managing service: {{ service_name }} (state: {{ service_state }}, enabled: {{ service_enabled }})
      tags:
        - always

  roles:
    - name: acme.package_setup.package_install
      vars:
        package_name: "{{ package_name }}"
        package_state: "{{ package_state }}"
      tags:
        - package
        - install

    - name: acme.package_setup.service_manage
      vars:
        service_name: "{{ service_name }}"
        service_state: "{{ service_state }}"
        service_enabled: "{{ service_enabled }}"
      tags:
        - service
        - management

  post_tasks:
    - name: Display automation completion summary
      ansible.builtin.debug:
        msg: |
          ACME Package Setup automation completed successfully:
          - Package '{{ package_name }}' state: {{ package_state }}
          - Service '{{ service_name }}' state: {{ service_state }} (enabled: {{ service_enabled }})
      tags:
        - always