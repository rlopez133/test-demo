---
# Main playbook for acme.package_setup collection
# This playbook orchestrates package installation and service management

- name: Install packages and manage services
  hosts: all
  gather_facts: true
  collections:
    - acme.package_setup
  
  tasks:
    - name: Install required packages
      ansible.builtin.include_role:
        name: package_installer
      tags:
        - packages
    
    - name: Manage services
      ansible.builtin.include_role:
        name: service_manager
      tags:
        - services