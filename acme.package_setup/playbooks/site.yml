---
# playbooks/site.yml - Main entry-point playbook for the acme.package_setup collection
#
# Usage:
#   ansible-playbook playbooks/site.yml -i <inventory>
#
# Optional tag filters:
#   --tags package   -> Only run package installation tasks
#   --tags service   -> Only run service management tasks

- name: "Site | Install and manage nginx"
  hosts: all
  gather_facts: true
  become: false  # become is set per-task inside the role

  roles:
    - role: acme.package_setup.nginx
      tags:
        - nginx
