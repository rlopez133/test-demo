---
- name: Configure nginx package and service
  hosts: all
  gather_facts: yes
  tags:
    - nginx
    - package
    - service

  roles:
    - name: Install nginx package
      role: acme.package_setup.nginx_install
      tags:
        - nginx_install
        - package

    - name: Manage nginx service
      role: acme.package_setup.nginx_service
      tags:
        - nginx_service
        - service
