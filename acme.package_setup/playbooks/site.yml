---
- name: ACME Package Setup - Main Playbook
  hosts: all
  gather_facts: true
  vars_files:
    - vars/main.yml
  
  pre_tasks:
    - name: Display playbook information
      ansible.builtin.debug:
        msg: |
          Starting ACME Package Setup collection
          Target hosts: {{ inventory_hostname }}
          Package to install: {{ package_name }}
          Service to manage: {{ service_name }}
      tags:
        - always
  
  roles:
    - role: acme.package_setup.package_install
      tags:
        - packages
      vars:
        package_name: "{{ package_name | default('nginx') }}"
        package_state: "{{ package_state | default('present') }}"
    
    - role: acme.package_setup.service_manage
      tags:
        - services
      vars:
        service_name: "{{ service_name | default('nginx') }}"
        service_state: "{{ service_state | default('started') }}"
        service_enabled: "{{ service_enabled | default(true) }}"
  
  post_tasks:
    - name: Verify service is running
      ansible.builtin.systemd_service:
        name: "{{ service_name | default('nginx') }}"
      register: service_info
      tags:
        - always
    
    - name: Display service status
      ansible.builtin.debug:
        msg: |
          Service {{ service_name | default('nginx') }} status:
          State: {{ service_info.status.ActiveState }}
          Enabled: {{ service_info.status.UnitFileState }}
      tags:
        - always
