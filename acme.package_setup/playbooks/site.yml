---
- name: ACME Package Setup Playbook
  hosts: all
  gather_facts: true
  tasks:
    - name: Include package installer role
      ansible.builtin.include_role:
        name: acme.package_setup.package_installer
      when: package_installer_packages is defined

    - name: Include service manager role
      ansible.builtin.include_role:
        name: acme.package_setup.service_manager
      when: service_manager_services is defined
