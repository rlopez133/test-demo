---
- name: ACME Package Setup Site Playbook
  hosts: all
  gather_facts: true
  collections:
    - acme.package_setup
  
  pre_tasks:
    - name: Display playbook start message
      ansible.builtin.debug:
        msg: "Starting ACME package setup automation"
        verbosity: 1
  
  roles:
    - role: package_installer
      name: "Install and manage packages"
      tags:
        - packages
        - core
    
    - role: service_manager
      name: "Manage service lifecycle"
      tags:
        - services
        - core
  
  post_tasks:
    - name: Display playbook completion message
      ansible.builtin.debug:
        msg: "ACME package setup automation completed successfully"
        verbosity: 1
