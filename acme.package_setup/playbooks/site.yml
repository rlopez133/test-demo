---
- name: Configure package setup across infrastructure
  hosts: all
  gather_facts: true
  vars_files:
    - vars/main.yml

  pre_tasks:
    - name: Validate target system prerequisites
      ansible.builtin.assert:
        that:
          - ansible_os_family is defined
        fail_msg: "Unable to determine OS family for target system"

  roles:
    - name: nginx_install
      tags:
        - nginx
        - package
        - service

  post_tasks:
    - name: Display completion summary
      ansible.builtin.debug:
        msg: "Package setup automation completed successfully"
      tags:
        - always
