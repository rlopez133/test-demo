---
- name: Test nginx package setup collection
  hosts: localhost
  gather_facts: true
  
  tasks:
    - name: Run site playbook
      ansible.builtin.command: ansible-playbook playbooks/site.yml --check
      changed_when: false
      register: playbook_test
      tags:
        - test

    - name: Verify playbook syntax
      ansible.builtin.debug:
        msg: "Playbook syntax validation passed"
      tags:
        - test

    - name: Test role defaults
      block:
        - name: Include nginx_service role with defaults
          ansible.builtin.include_role:
            name: nginx_service
            tasks_from: main
          vars:
            nginx_package_state: present
            nginx_service_state: started
          tags:
            - test
      
      rescue:
        - name: Role test failed
          ansible.builtin.fail:
            msg: "nginx_service role test failed"
          tags:
            - test
