---
# Handlers for service management role

- name: Restart service
  ansible.builtin.systemd:
    name: "{{ service_name }}"
    state: restarted
    daemon_reload: "{{ daemon_reload }}"
  listen: restart_service

- name: Reload service
  ansible.builtin.systemd:
    name: "{{ service_name }}"
    state: reloaded
    daemon_reload: "{{ daemon_reload }}"
  listen: reload_service