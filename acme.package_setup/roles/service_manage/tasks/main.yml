---
- name: Manage service state
  tags:
    - service
    - management
  block:
    - name: Ensure service is in desired state
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: "{{ service_state | default('started') }}"
        enabled: "{{ service_enabled | default(true) }}"
      register: service_manage_result

    - name: Display service management result
      ansible.builtin.debug:
        msg: "Service '{{ service_name }}' is now in state: {{ service_state | default('started') }}"
        verbosity: 1

  rescue:
    - name: Handle service management failure
      ansible.builtin.fail:
        msg: "Failed to manage service '{{ service_name }}'. Error: {{ ansible_failed_result.msg }}"

  always:
    - name: Log service management attempt
      ansible.builtin.debug:
        msg: "Service management attempt for '{{ service_name }}' completed"
        verbosity: 2