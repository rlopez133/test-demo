---
# Tasks for managing system services

- name: Ensure systemd daemon is reloaded
  ansible.builtin.systemd:
    daemon_reload: true
  when: daemon_reload | bool
  tags:
    - service
    - service_manage

- name: Manage service state and enablement
  ansible.builtin.systemd:
    name: "{{ service_name }}"
    state: "{{ service_state }}"
    enabled: "{{ service_enabled }}"
  tags:
    - service
    - service_manage
  register: service_manage_result

- name: Display service management result
  ansible.builtin.debug:
    msg: "Service {{ service_name }} is {{ service_state }}"
  when: service_manage_result is defined
  tags:
    - service
    - service_manage
    - debug