---
- name: Service management tasks
  tags:
    - service_manage
    - services

- name: Reload systemd daemon if requested
  ansible.builtin.systemd_service:
    daemon_reload: true
  when: service_daemon_reload | bool
  tags:
    - service_manage
    - services

- name: Manage service state and boot behavior
  ansible.builtin.systemd_service:
    name: "{{ service_name }}"
    state: "{{ service_state }}"
    enabled: "{{ service_enabled }}"
    daemon_reload: false
  tags:
    - service_manage
    - services
