---
- name: Reload systemd daemon if requested
  ansible.builtin.systemd_service:
    daemon_reload: true
  when:
    - service_manager_daemon_reload | bool
  tags:
    - service
    - service_manager

- name: Manage service state
  ansible.builtin.systemd_service:
    name: "{{ item.name }}"
    state: "{{ item.state | default('started') }}"
    enabled: "{{ item.enabled | default(service_manager_enabled) }}"
    daemon_reload: false
  loop: "{{ service_manager_services }}"
  when:
    - service_manager_services is defined
    - service_manager_services | length > 0
  tags:
    - service
    - service_manager
