---
# Tasks for service_manager role

- name: Daemon reload if requested
  ansible.builtin.systemd:
    daemon_reload: true
  when: service_manager_daemon_reload | bool
  tags:
    - service_manager
    - service

- name: Manage service state
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: "{{ service_manager_state }}"
    enabled: "{{ service_manager_enabled }}"
    daemon_reload: "{{ service_manager_daemon_reload }}"
  loop: "{{ service_manager_services }}"
  register: service_manage_result
  tags:
    - service_manager
    - service
  retries: 3
  delay: 2
  until: service_manage_result is succeeded

- name: Display service management results
  ansible.builtin.debug:
    msg: |
      Service management completed.
      Services: {{ service_manager_services | join(', ') }}
      State: {{ service_manager_state }}
      Enabled: {{ service_manager_enabled }}
  tags:
    - service_manager
    - service