---
- name: Ensure systemd service is in desired state
  ansible.builtin.systemd_service:
    name: "{{ service_name }}"
    state: "{{ service_state }}"
    enabled: "{{ service_enabled }}"
    daemon_reload: true
  register: service_result
  tags:
    - service
    - service-manager

- name: Display service status
  ansible.builtin.debug:
    msg: "Service {{ service_name }} state is {{ service_state }} and enabled: {{ service_enabled }}"
  tags:
    - service
    - service-manager

- name: Verify service is running (when state is started)
  ansible.builtin.systemd_service:
    name: "{{ service_name }}"
  register: service_status
  when: service_state == "started"
  tags:
    - service
    - service-manager

- name: Display service verification result
  ansible.builtin.debug:
    msg: "Service {{ service_name }} is active: {{ service_status.status.ActiveState | default('unknown') }}"
  when:
    - service_state == "started"
    - service_status is defined
  tags:
    - service
    - service-manager
