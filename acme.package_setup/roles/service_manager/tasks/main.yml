---
- name: Manage service state and enablement
  tags:
    - services
    - service-management
  block:
    - name: Ensure service is in desired state
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: "{{ service_action }}"
        enabled: "{{ service_enabled }}"
      register: service_action_result

    - name: Log service action result
      ansible.builtin.debug:
        msg: "Service {{ service_name }} action {{ service_action }} - Changed: {{ service_action_result.changed }}"
      tags:
        - debug

    - name: Verify service is running
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: started
      when:
        - service_action in ['started', 'restarted', 'reloaded']
      tags:
        - verify

  rescue:
    - name: Handle service management failure
      ansible.builtin.fail:
        msg: "Failed to manage service {{ service_name }}. Ensure the service exists and is available."
