---
- name: Ensure systemd daemon is reloaded
  ansible.builtin.systemd_service:
    daemon_reload: "{{ service_daemon_reload }}"
  become: true
  tags:
    - service
    - systemd

- name: Manage service state (started/stopped/restarted/reloaded)
  ansible.builtin.systemd_service:
    name: "{{ service_name }}"
    state: "{{ service_state }}"
    enabled: "{{ service_enabled }}"
  become: true
  timeout: "{{ service_timeout }}"
  register: service_action
  tags:
    - service
    - lifecycle

- name: Validate service state
  ansible.builtin.systemd_service:
    name: "{{ service_name }}"
  become: true
  register: service_status
  changed_when: false
  tags:
    - service
    - validate

- name: Report service status
  ansible.builtin.debug:
    msg: |
      Service: {{ service_name }}
      Desired state: {{ service_state }}
      Current state: {{ service_status.status.ActiveState }}
      Enabled: {{ service_status.status.UnitFileState }}
  tags:
    - service
    - debug