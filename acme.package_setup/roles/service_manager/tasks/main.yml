---
# Manage systemd service lifecycle

- name: Manage service state
  ansible.builtin.systemd_service:
    name: "{{ service_name }}"
    state: "{{ service_action }}"
    enabled: "{{ service_enabled }}"
    daemon_reload: true
  tags:
    - service
    - service_manager
  register: service_result

- name: Wait for service to be ready
  ansible.builtin.wait_for:
    port: "{{ service_port | default(80) }}"
    host: "{{ service_host | default('127.0.0.1') }}"
    timeout: "{{ service_timeout }}"
    delay: 2
  when:
    - service_action == 'started'
    - service_result is changed
  ignore_errors: true
  tags:
    - service
    - service_manager
    - validation

- name: Verify service is running
  ansible.builtin.systemd_service:
    name: "{{ service_name }}"
  register: service_status
  failed_when: service_status.status['ActiveState'] != 'active'
  when: service_action == 'started'
  tags:
    - service
    - service_manager
    - validation
