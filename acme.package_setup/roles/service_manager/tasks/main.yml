---
- name: Service manager role
  block:
    - name: Check service status
      ansible.builtin.systemd:
        name: "{{ service_name }}"
      become: true
      register: service_status
      tags:
        - service
        - info

    - name: Manage service state - {{ service_action }}
      ansible.builtin.systemd:
        name: "{{ service_name }}"
        state: "{{ service_action }}"
        enabled: "{{ service_enabled }}"
      become: true
      register: service_manage_result
      tags:
        - service
        - manage

    - name: Display service management result
      ansible.builtin.debug:
        msg: "Service {{ service_name }} {{ service_action }} operation completed"
        verbosity: 1
      tags:
        - service
        - info

    - name: Verify service is in desired state
      ansible.builtin.systemd:
        name: "{{ service_name }}"
      become: true
      register: service_verify_result
      tags:
        - service
        - verify

    - name: Display service verification
      ansible.builtin.debug:
        msg: |
          Service {{ service_name }} state:
          - Active: {{ service_verify_result.status.ActiveState }}
          - Enabled: {{ service_verify_result.status.UnitFileState }}
        verbosity: 1
      tags:
        - service
        - info

  rescue:
    - name: Handle service management failure
      ansible.builtin.debug:
        msg: "Failed to manage service {{ service_name }}: {{ ansible_failed_result.msg }}"
      tags:
        - service
        - error
