---
# Service manager defaults
# These variables control service lifecycle behavior

# Name of the service to manage
service_name: "nginx"

# Desired service state (started/stopped/restarted/reloaded)
service_state: "started"

# Whether service should be enabled to start on boot
service_enabled: true

# Daemon reload before managing service (systemd systems)
service_daemon_reload: true

# Number of seconds to wait for service state change
service_timeout: 30