---
# Service manager defaults

# List of services to manage
# Each service should have 'name' and 'state' fields
# state can be: started, stopped, restarted, reloaded
service_manager_services: []

# Whether to enable services on boot (true/false)
service_manager_enabled: true

# Daemon reload after service changes (systemd systems)
service_manager_daemon_reload: false
