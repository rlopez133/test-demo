---
# Service manager handlers for state changes

- name: Restart service
  ansible.builtin.systemd_service:
    name: "{{ service_name }}"
    state: restarted
    daemon_reload: true
  tags:
    - service
    - service_manager

- name: Reload service
  ansible.builtin.systemd_service:
    name: "{{ service_name }}"
    state: reloaded
    daemon_reload: true
  tags:
    - service
    - service_manager
