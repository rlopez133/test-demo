---
# Service manager handlers
# Handlers are triggered by notify statements in tasks

- name: Restart service
  ansible.builtin.systemd:
    name: "{{ service_name }}"
    state: restarted
  become: true
  listen: "restart {{ service_name }}"

- name: Reload service
  ansible.builtin.systemd:
    name: "{{ service_name }}"
    state: reloaded
  become: true
  listen: "reload {{ service_name }}"

- name: Enable service on boot
  ansible.builtin.systemd:
    name: "{{ service_name }}"
    enabled: true
  become: true
  listen: "enable {{ service_name }}"
