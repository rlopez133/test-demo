---
- name: Install nginx package
  block:
    - name: Install nginx using package manager
      ansible.builtin.package:
        name: "{{ nginx_package_name }}"
        state: "{{ nginx_state }}"
      notify: Restart nginx service
      tags:
        - package
        - install

  rescue:
    - name: Handle package installation failure
      ansible.builtin.fail:
        msg: |
          Failed to install nginx package: {{ nginx_package_name }}
          Check that the package manager is configured and the package exists
      tags:
        - never
        - debug

- name: Manage nginx service
  block:
    - name: Ensure nginx service is in desired state
      ansible.builtin.service:
        name: "{{ nginx_service_name }}"
        state: "{{ nginx_service_state }}"
        enabled: "{{ nginx_service_enabled }}"
      tags:
        - service
        - start

  rescue:
    - name: Handle service management failure
      ansible.builtin.fail:
        msg: |
          Failed to manage nginx service: {{ nginx_service_name }}
          Verify the service exists and systemd is available
      tags:
        - never
        - debug

- name: Validate nginx installation
  block:
    - name: Check if nginx is running
      ansible.builtin.service_facts:
      register: service_facts_result
      tags:
        - validate
        - check

    - name: Assert nginx service is running
      ansible.builtin.assert:
        that:
          - service_facts_result.ansible_facts.services[nginx_service_name].state == 'running'
        fail_msg: "Nginx service is not in running state"
        success_msg: "Nginx service is running correctly"
      tags:
        - validate
        - check

  rescue:
    - name: Warn if validation fails
      ansible.builtin.debug:
        msg: "Warning: Unable to validate nginx service state. Manual verification recommended."
      tags:
        - never
        - debug
