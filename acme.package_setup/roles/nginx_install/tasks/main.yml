---
- name: Update package cache (Debian/Ubuntu)
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  when: ansible_os_family == 'Debian'
  tags:
    - package
    - nginx_install

- name: Update package cache (RHEL/CentOS)
  ansible.builtin.yum:
    update_cache: yes
  when: ansible_os_family == 'RedHat'
  tags:
    - package
    - nginx_install

- name: Install nginx package
  ansible.builtin.package:
    name: "{{ nginx_package_name }}"
    state: "{{ nginx_package_state }}"
  register: nginx_install_result
  tags:
    - package
    - nginx_install

- name: Display nginx installation result
  ansible.builtin.debug:
    msg: "nginx package {{ nginx_package_state }}: {{ nginx_install_result.changed }}"
  tags:
    - package
    - nginx_install
