---
- name: nginx_setup | Install nginx package
  ansible.builtin.package:
    name: "{{ ngix_package_name }}"
    state: "{{ ngix_package_state }}"
  tags:
    - nginx
    - package
    - install
  register: nginx_install_result

- name: nginx_setup | Ensure nginx service is in desired state
  ansible.builtin.service:
    name: "{{ ngix_service_name }}"
    state: "{{ ngix_service_state }}"
    enabled: "{{ ngix_service_enabled }}"
  tags:
    - nginx
    - service
    - manage
  when: ngix_package_state == 'present'

- name: nginx_setup | Validate nginx configuration syntax
  ansible.builtin.command:
    cmd: "{{ ngix_service_name }} -t"
  changed_when: false
  tags:
    - nginx
    - validate
    - config
  when: ngix_package_state == 'present'

- name: nginx_setup | Display package installation result
  ansible.builtin.debug:
    msg: |
      Package: {{ ngix_package_name }}
      State: {{ ngix_package_state }}
      Service: {{ ngix_service_name }}
      Service State: {{ ngix_service_state }}
      Service Enabled: {{ ngix_service_enabled }}
  tags:
    - nginx
    - debug