---
# Package installer defaults

# List of packages to install/remove
# Each package should have a 'name' and 'state' field
# state can be: present, absent, latest
package_installer_packages: []

# Update package cache before installing (apt-based systems)
package_installer_update_cache: false

# Update package cache validity time in seconds (apt-based systems)
package_installer_cache_valid_time: 3600
