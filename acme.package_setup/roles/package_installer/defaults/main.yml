---
# Package installer role defaults
# These variables control package installation behavior

# Package name to install
package_name: nginx

# Package state: 'present' to install, 'absent' to remove, 'latest' for latest version
package_state: present

# Whether to update package cache before installing (only relevant for apt)
update_cache: true

# Cache valid time in seconds (only relevant for apt)
cache_valid_time: 3600
