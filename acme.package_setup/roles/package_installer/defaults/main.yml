---
# Package installer defaults
# These variables control package installation behavior

# Name of the package to install
package_name: "nginx"

# Desired state of the package (present/absent)
package_state: "present"

# Update package cache before installing (applies to apt-based systems)
package_cache_update: true

# Allow package downgrades (yum/dnf only)
package_allow_downgrade: false

# Allow package erasing via package install (yum/dnf only)
package_allow_erasing: false