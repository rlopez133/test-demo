---
- name: Update package cache (apt)
  ansible.builtin.apt:
    cache_valid_time: 3600
    update_cache: "{{ package_cache_update }}"
  become: true
  when:
    - ansible_os_family == "Debian"
  tags:
    - package
    - cache

- name: Install or remove package (apt)
  ansible.builtin.apt:
    name: "{{ package_name }}"
    state: "{{ package_state }}"
  become: true
  when:
    - ansible_os_family == "Debian"
  tags:
    - package
    - install

- name: Install or remove package (yum)
  ansible.builtin.yum:
    name: "{{ package_name }}"
    state: "{{ package_state }}"
    allow_downgrade: "{{ package_allow_downgrade }}"
  become: true
  when:
    - ansible_os_family == "RedHat"
    - ansible_distribution_major_version | int < 8 or not (ansible_distribution == "Fedora")
  tags:
    - package
    - install

- name: Install or remove package (dnf)
  ansible.builtin.dnf:
    name: "{{ package_name }}"
    state: "{{ package_state }}"
    allow_downgrade: "{{ package_allow_downgrade }}"
  become: true
  when:
    - ansible_os_family == "RedHat"
    - ansible_distribution_major_version | int >= 8 or ansible_distribution == "Fedora"
  tags:
    - package
    - install

- name: Install or remove package (zypper)
  community.general.zypper:
    name: "{{ package_name }}"
    state: "{{ package_state }}"
  become: true
  when:
    - ansible_os_family == "Suse"
  tags:
    - package
    - install

- name: Validate package installation
  ansible.builtin.command:
    cmd: "rpm -q {{ package_name }}"
  register: package_validation
  changed_when: false
  failed_when: false
  when:
    - ansible_os_family == "RedHat"
    - package_state == "present"
  tags:
    - package
    - validate

- name: Report package installation status
  ansible.builtin.debug:
    msg: "Package {{ package_name }} is {{ package_state }}"
  tags:
    - package
    - debug