---
- name: Package installer role
  tags:
    - package
    - package_installer

- name: Update package cache (Debian-based systems)
  ansible.builtin.apt:
    update_cache: "{{ update_cache }}"
    cache_valid_time: "{{ cache_valid_time }}"
  when:
    - ansible_os_family == "Debian"
    - package_state != "absent"
  tags:
    - package
    - cache

- name: Install package on Debian-based systems
  ansible.builtin.apt:
    name: "{{ package_name }}"
    state: "{{ package_state }}"
  when: ansible_os_family == "Debian"
  register: apt_result
  tags:
    - package
    - install

- name: Install package on RedHat-based systems
  ansible.builtin.yum:
    name: "{{ package_name }}"
    state: "{{ package_state }}"
  when: ansible_os_family == "RedHat"
  register: yum_result
  tags:
    - package
    - install

- name: Display installation result
  ansible.builtin.debug:
    msg: "Package {{ package_name }} state is now {{ package_state }}"
  tags:
    - package
    - debug
