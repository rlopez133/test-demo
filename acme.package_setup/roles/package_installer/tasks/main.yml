---
# Tasks for package_installer role

- name: Update package cache (Debian/Ubuntu)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: "{{ package_installer_cache_timeout }}"
  when:
    - ansible_pkg_mgr == 'apt'
    - package_installer_update_cache | bool
  tags:
    - package_installer
    - package

- name: Update package cache (RedHat/EL)
  ansible.builtin.yum:
    update_cache: true
  when:
    - ansible_pkg_mgr in ['yum', 'dnf']
    - package_installer_update_cache | bool
  tags:
    - package_installer
    - package

- name: Install packages on Debian/Ubuntu systems
  ansible.builtin.apt:
    name: "{{ package_installer_packages }}"
    state: "{{ package_installer_state }}"
  when: ansible_pkg_mgr == 'apt'
  register: apt_install_result
  tags:
    - package_installer
    - package

- name: Install packages on RedHat/EL systems
  ansible.builtin.yum:
    name: "{{ package_installer_packages }}"
    state: "{{ package_installer_state }}"
  when: ansible_pkg_mgr in ['yum', 'dnf']
  register: yum_install_result
  tags:
    - package_installer
    - package

- name: Display installation results
  ansible.builtin.debug:
    msg: |
      Package installation completed.
      State: {{ package_installer_state }}
      Packages: {{ package_installer_packages | join(', ') }}
  when:
    - apt_install_result is defined or yum_install_result is defined
  tags:
    - package_installer
    - package