---
# Install and manage system packages

- name: Update package cache if requested
  ansible.builtin.apt:
    cache_valid_time: "{{ package_cache_timeout }}"
    update_cache: "{{ package_update_cache }}"
  when: ansible_os_family | default('') == 'Debian'
  tags:
    - package
    - package_installer

- name: Install or manage package on Debian-based systems
  ansible.builtin.apt:
    name: "{{ package_name }}"
    state: "{{ package_state }}"
  when: ansible_os_family | default('') == 'Debian'
  tags:
    - package
    - package_installer

- name: Install or manage package on RedHat-based systems
  ansible.builtin.yum:
    name: "{{ package_name }}"
    state: "{{ package_state }}"
  when: ansible_os_family | default('') == 'RedHat'
  tags:
    - package
    - package_installer

- name: Validate package installation
  ansible.builtin.command:
    cmd: "which {{ package_name | split('-') | first }}"
  register: package_check
  failed_when: package_check.rc != 0
  when: package_state == 'present'
  changed_when: false
  tags:
    - package
    - package_installer
    - validation
