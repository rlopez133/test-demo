---
- name: Update package cache (Debian-based systems)
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600
  when:
    - ansible_os_family == "Debian"
    - update_package_cache | bool
  tags:
    - package
    - package-installer

- name: Update package cache (RedHat-based systems)
  ansible.builtin.yum:
    update_cache: true
  when:
    - ansible_os_family == "RedHat"
    - update_package_cache | bool
  tags:
    - package
    - package-installer

- name: Install package on Debian-based systems
  ansible.builtin.apt:
    name: "{{ package_name }}"
    state: "{{ package_state }}"
  when: ansible_os_family == "Debian"
  register: apt_install_result
  tags:
    - package
    - package-installer

- name: Install package on RedHat-based systems
  ansible.builtin.yum:
    name: "{{ package_name }}"
    state: "{{ package_state }}"
  when: ansible_os_family == "RedHat"
  register: yum_install_result
  tags:
    - package
    - package-installer

- name: Display installation result
  ansible.builtin.debug:
    msg: "Package {{ package_name }} installation completed with state {{ package_state }}"
  tags:
    - package
    - package-installer
