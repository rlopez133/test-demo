---
- name: Package installer role
  block:
    - name: Gather package facts
      ansible.builtin.package_facts:
        manager: auto
      tags:
        - package
        - info

    - name: Install package "{{ package_name }}"
      ansible.builtin.package:
        name: "{{ package_name }}"
        state: "{{ package_state }}"
      become: true
      register: package_install_result
      tags:
        - package
        - install

    - name: Display package installation result
      ansible.builtin.debug:
        msg: "Package {{ package_name }} {{ package_state }} operation completed"
        verbosity: 1
      tags:
        - package
        - info

  rescue:
    - name: Handle package installation failure
      ansible.builtin.debug:
        msg: "Failed to {{ package_state }} package {{ package_name }}: {{ ansible_failed_result.msg }}"
      tags:
        - package
        - error
