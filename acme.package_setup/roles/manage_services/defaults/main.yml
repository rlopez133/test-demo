---
# List of services to manage
# This variable should be overridden in playbooks or inventories
manage_services_list:
  - nginx

# Service action: started, stopped, restarted, reloaded
# started: start the service if not running
# stopped: stop the service if running
# restarted: restart the service
# reloaded: reload the service (if supported)
manage_services_action: started

# Enable service on system boot
manage_services_enabled: true
