---
# Service management variables for Nginx

# nginx_service_name: Name of the Nginx systemd service
nginx_service_name: nginx

# nginx_service_state: Desired state of the Nginx service
# Valid values: started, stopped, restarted, reloaded
nginx_service_state: started

# nginx_service_enabled: Whether Nginx service should be enabled on boot
nginx_service_enabled: true
