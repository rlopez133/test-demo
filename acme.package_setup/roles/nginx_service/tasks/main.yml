---
- name: Install nginx package
  block:
    - name: Update package manager cache (Debian/Ubuntu)
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600
      when: ansible_os_family == "Debian"
      tags:
        - package
        - nginx-install

    - name: Install nginx package
      ansible.builtin.package:
        name: "{{ nginx_package_name }}"
        state: "{{ nginx_package_state }}"
      tags:
        - package
        - nginx-install
      register: nginx_install_result

  rescue:
    - name: Display package installation error
      ansible.builtin.debug:
        msg: "Failed to install {{ nginx_package_name }}: {{ ansible_failed_result.msg }}"
      tags:
        - package
        - nginx-install
      failed_when: true

- name: Manage nginx service
  block:
    - name: Validate nginx configuration
      ansible.builtin.shell: |
        set -e
        if command -v nginx &> /dev/null; then
          nginx -t
        fi
      changed_when: false
      when: nginx_validate_config | bool
      tags:
        - service
        - nginx-service
        - validation

    - name: Ensure nginx service is {{ nginx_service_state }}
      ansible.builtin.service:
        name: "{{ nginx_service_name }}"
        state: "{{ nginx_service_state }}"
        enabled: "{{ nginx_service_enabled }}"
      tags:
        - service
        - nginx-service
      register: nginx_service_result

    - name: Display service status
      ansible.builtin.debug:
        msg: "Nginx service {{ nginx_service_state }} - changed: {{ nginx_service_result.changed }}"
      tags:
        - service
        - nginx-service

  rescue:
    - name: Display service management error
      ansible.builtin.debug:
        msg: "Failed to manage {{ nginx_service_name }} service: {{ ansible_failed_result.msg }}"
      tags:
        - service
        - nginx-service
      failed_when: true
