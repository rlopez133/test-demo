---
- name: Ensure nginx service is in desired state
  ansible.builtin.service:
    name: "{{ nginx_service_name }}"
    state: "{{ nginx_service_state }}"
    enabled: "{{ nginx_service_enabled }}"
  register: nginx_service_result
  tags:
    - service
    - nginx_service

- name: Display nginx service status
  ansible.builtin.debug:
    msg: "nginx service {{ nginx_service_state }}: state={{ nginx_service_result.changed }}"
  tags:
    - service
    - nginx_service

- name: Wait for nginx to be ready
  ansible.builtin.wait_for:
    host: localhost
    port: 80
    delay: 2
    timeout: 30
    state: started
  when: nginx_service_state == 'started'
  tags:
    - service
    - nginx_service
