---
# Handlers for service management
# These handlers are triggered by tasks that modify service configuration

- name: Restart service
  ansible.builtin.systemd_service:
    name: '{{ service_name }}'
    state: restarted
    daemon_reload: true
  tags:
    - service
    - handler

- name: Reload service
  ansible.builtin.systemd_service:
    name: '{{ service_name }}'
    state: reloaded
    daemon_reload: true
  tags:
    - service
    - handler

- name: Reload systemd daemon
  ansible.builtin.systemd_service:
    daemon_reload: true
  tags:
    - service
    - handler
