---
# Nginx Package Installation Tasks
# This role ensures nginx package is installed with proper state management

- name: Ensure nginx package is in desired state
  ansible.builtin.package:
    name: "{{ nginx_package_name }}"
    state: "{{ nginx_package_state }}"
    update_cache: "{{ nginx_update_cache }}"
  tags:
    - package-management
    - nginx-install
