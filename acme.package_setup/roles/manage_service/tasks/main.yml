---
# Role: manage_service
# Purpose: Manage service state and startup configuration

- name: Ensure service is in desired state
  ansible.builtin.service:
    name: "{{ service_name }}"
    state: "{{ service_state }}"
    enabled: "{{ service_enabled }}"
    daemon_reload: "{{ service_daemon_reload }}"
  register: service_manage_result
  tags:
    - service
    - service_manage
  block:
    - name: Manage service state
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: "{{ service_state }}"
        enabled: "{{ service_enabled }}"
        daemon_reload: "{{ service_daemon_reload }}"
      register: service_manage_result
      tags:
        - service
        - service_manage

  rescue:
    - name: Handle service management failure
      ansible.builtin.debug:
        msg: "Failed to manage service '{{ service_name }}'. Ensure the service is installed and the systemd daemon is available."
      tags:
        - service
        - service_manage

  always:
    - name: Display service management result
      ansible.builtin.debug:
        msg: "Service '{{ service_name }}' state set to '{{ service_state }}' with enabled='{{ service_enabled }}'"
      tags:
        - service
        - service_manage
