---
- name: Install packages
  tags:
    - package
    - install
  block:
    - name: Install package(s) using native package manager
      ansible.builtin.package:
        name: "{{ package_name }}"
        state: "{{ package_state | default('present') }}"
      register: package_install_result
      until: package_install_result is succeeded
      retries: 3
      delay: 5

    - name: Display package installation result
      ansible.builtin.debug:
        msg: "Package '{{ package_name }}' installation state: {{ package_state | default('present') }}"
        verbosity: 1

  rescue:
    - name: Handle package installation failure
      ansible.builtin.fail:
        msg: "Failed to install package '{{ package_name }}'. Error: {{ ansible_failed_result.msg }}"

  always:
    - name: Log package installation attempt
      ansible.builtin.debug:
        msg: "Package installation attempt for '{{ package_name }}' completed"
        verbosity: 2