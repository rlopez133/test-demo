---
- name: Verify
  hosts: all
  gather_facts: yes
  become: yes

  tasks:
    - name: Check if nginx package is installed
      ansible.builtin.package_facts:
        manager: auto
      register: pkg_facts

    - name: Assert nginx is installed
      ansible.builtin.assert:
        that:
          - "'nginx' in pkg_facts.ansible_facts.ansible_pkg_mgr"
        fail_msg: "nginx package is not installed"

    - name: Check if nginx service is running
      ansible.builtin.systemd:
        name: nginx
      register: nginx_service_state

    - name: Assert nginx service is active
      ansible.builtin.assert:
        that:
          - nginx_service_state.status.ActiveState == 'active'
        fail_msg: "nginx service is not running"

    - name: Verify nginx is listening on port 80
      ansible.builtin.wait_for:
        host: localhost
        port: 80
        state: started
        timeout: 10
